#############################################################
# defines the general settings for this file
#############################################################
[general]                                       # general settings for this file 
cnt_data_link = 1                               # number of data-link-layers defined in this file
max_msg_req = 100                               # message queue between physical layer and application


#############################################################
# defines the pysical network connection for BACnet/IP for TD
#############################################################
[data_link 1]                                   # first data-link-layer
port_id     = 1                                 # port-no. 1
type        = ip                                # physical BACnet/IP network
lan_name    = 0.0.0.0                          # IP-address of the TD (the BACnet Test Framework)
net_number  = 1                                 # BACnet network-no. for the pysical network
udp_port    = 47808                             # BACnet-port
max_msg_req = 50                                # message queue between the physical layers
#############################################################
# defines the FD for the TD-Layer
# 
# Please note that only BBMD or FD may be defined!
# 
# If both is configured, the stack will not run properly.
#############################################################
#foreign_dev_addr        = 192.168.1.1:47808     # ip/port address of BBMD to register to
#foreign_dev_reg_timeout = 10                    # re-register-time in seconds


#############################################################
# BBMD/FD support
#
# Please note that only BBMD or FD may be defined!
# 
# If both is configured, the stack will not run properly.
#
#############################################################

#############################################################
# defines the BBMD
#############################################################
#[bbmd]                                          # BBMD configuration
#twohop                  = YES                   # one or two hop message for own BBMD
#cnt_bbmd                = 1                     # number of external BBMD entries
#addr_0 = 127.0.0.1
#mask_0 = 255.255.255.255
